<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Celeste ERP">
  <meta name="theme-color" content="#0EA5E9">
  <meta name="description" content="Sistema ERP para Celeste Taller Creativo">

  <title>Celeste Taller Creativo</title>

  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>

  <!-- ── Login Screen ────────────────────────────────────────────────────── -->
  <div id="login-screen" class="login-screen hidden">
    <div class="login-container">

      <div class="login-logo">
        <div class="login-logo-icon">✦</div>
        <h1 class="login-title">Celeste</h1>
        <p class="login-subtitle">Taller Creativo</p>
      </div>

      <!-- Step 1: email input -->
      <div id="login-step-select">
        <p class="pin-label" style="margin-bottom:0">Ingresa tu correo</p>
        <form id="email-form" class="email-form" autocomplete="on">
          <input
            id="email-input"
            type="email"
            inputmode="email"
            autocomplete="email"
            placeholder="correo@ejemplo.com"
            class="email-input"
            required
          />
          <button type="submit" class="btn-email-continue">Continuar →</button>
        </form>
        <p class="pin-error hidden" id="email-error">Correo no autorizado.</p>
      </div>

      <!-- Step 2: PIN + Face ID for selected user -->
      <div id="login-step-auth" class="hidden">
        <div class="selected-user-info">
          <div class="selected-user-avatar" id="selected-avatar">A</div>
          <p class="selected-user-name" id="selected-name">Andrés</p>
          <button class="btn-change-user" id="btn-change-user" type="button">↩ Cambiar usuario</button>
        </div>

        <button id="btn-passkey" class="btn-passkey hidden" type="button">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
            <circle cx="12" cy="9" r="2.5"/>
          </svg>
          Face ID / Touch ID
        </button>

        <p class="pin-divider hidden" id="pin-divider">— o usa tu PIN —</p>

        <p class="pin-label">Ingresa tu PIN</p>

        <div class="pin-dots" id="pin-dots">
          <span class="pin-dot"></span>
          <span class="pin-dot"></span>
          <span class="pin-dot"></span>
          <span class="pin-dot"></span>
          <span class="pin-dot"></span>
          <span class="pin-dot"></span>
        </div>

        <p class="pin-error hidden" id="pin-error">PIN incorrecto. Intenta de nuevo.</p>

        <div class="numpad" id="numpad">
          <button class="numpad-btn" data-digit="1">1</button>
          <button class="numpad-btn" data-digit="2">2</button>
          <button class="numpad-btn" data-digit="3">3</button>
          <button class="numpad-btn" data-digit="4">4</button>
          <button class="numpad-btn" data-digit="5">5</button>
          <button class="numpad-btn" data-digit="6">6</button>
          <button class="numpad-btn" data-digit="7">7</button>
          <button class="numpad-btn" data-digit="8">8</button>
          <button class="numpad-btn" data-digit="9">9</button>
          <button class="numpad-btn numpad-empty"></button>
          <button class="numpad-btn" data-digit="0">0</button>
          <button class="numpad-btn numpad-delete" id="pin-delete">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/>
              <line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/>
            </svg>
          </button>
        </div>
      </div>

    </div>
  </div>

  <!-- ── Main App ─────────────────────────────────────────────────────────── -->
  <div id="app-wrapper" class="app-wrapper hidden">

    <!-- Sidebar (desktop only) -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <span class="sidebar-logo-icon">✦</span>
        <div>
          <p class="sidebar-brand">Celeste</p>
          <p class="sidebar-brand-sub">Taller Creativo</p>
        </div>
      </div>

      <nav class="sidebar-nav">
        <p class="sidebar-divider">Principal</p>
        <button class="sidebar-item" data-view="dashboard">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          Inicio
        </button>
        <button class="sidebar-item" data-view="ventas">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="1" x2="12" y2="23"/>
            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
          Ventas
        </button>
        <button class="sidebar-item" data-view="pedidos">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          Pedidos
        </button>

        <p class="sidebar-divider">Catálogo</p>
        <button class="sidebar-item" data-view="inventario">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
          </svg>
          Inventario
        </button>
        <button class="sidebar-item" data-view="clientes">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          Clientes
        </button>

        <button class="sidebar-item" data-view="cursos">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
            <path d="M6 12v5c3 3 9 3 12 0v-5"/>
          </svg>
          Cursos
        </button>

        <p class="sidebar-divider">Finanzas</p>
        <button class="sidebar-item" data-view="finanzas">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="1" x2="12" y2="23"/>
            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
          Finanzas
        </button>
        <button class="sidebar-item" data-view="gastos">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/>
            <line x1="1" y1="10" x2="23" y2="10"/>
          </svg>
          Gastos
        </button>
      </nav>

      <div class="sidebar-actions" style="position:relative">
        <button class="sidebar-fab" id="sidebar-fab">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Nuevo registro
        </button>
        <div class="sidebar-fab-menu hidden" id="sidebar-fab-menu">
          <button class="sidebar-fab-menu-item" data-view="nueva-venta">
            <span style="color:var(--color-success)">💵</span> Nueva Venta
          </button>
          <button class="sidebar-fab-menu-item" data-view="nuevo-gasto">
            <span style="color:var(--color-danger)">💸</span> Nuevo Gasto
          </button>
          <button class="sidebar-fab-menu-item" data-view="nuevo-pedido">
            <span style="color:var(--color-info)">📋</span> Nuevo Pedido
          </button>
        </div>
      </div>

      <div class="sidebar-footer">
        <div class="sidebar-user-avatar" id="sidebar-avatar">A</div>
        <div class="sidebar-user">
          <p class="sidebar-user-name" id="sidebar-user-name">Usuario</p>
          <p class="sidebar-user-email" id="sidebar-user-email">—</p>
        </div>
        <button class="sidebar-logout-btn" id="sidebar-logout" title="Cerrar sesión">↩</button>
      </div>
    </aside>

    <!-- Top bar -->
    <header class="top-bar" id="top-bar">
      <div class="top-bar-left">
        <button class="btn-icon" id="btn-back" style="display:none" aria-label="Volver">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <span class="top-bar-title" id="top-bar-title">Inicio</span>
      </div>
      <div class="top-bar-right">
        <button class="btn-icon" id="btn-refresh" aria-label="Actualizar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Main content -->
    <main id="app-content" class="app-content">
      <!-- Views are rendered here dynamically -->
      <div class="loading-state" id="initial-loader">
        <div class="spinner"></div>
        <p>Cargando...</p>
      </div>
    </main>

    <!-- Bottom navigation -->
    <nav class="bottom-nav" id="bottom-nav">
      <button class="nav-item" data-view="dashboard" aria-label="Inicio">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span class="nav-label">Inicio</span>
      </button>

      <button class="nav-item" data-view="ventas" aria-label="Ventas">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="1" x2="12" y2="23"/>
          <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
        </svg>
        <span class="nav-label">Ventas</span>
      </button>

      <button class="nav-item nav-item-center" id="btn-fab" aria-label="Nueva venta">
        <div class="fab-circle">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </div>
      </button>

      <button class="nav-item" data-view="pedidos" aria-label="Pedidos">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        <span class="nav-label">Pedidos</span>
      </button>

      <button class="nav-item" data-view="mas" aria-label="Más">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/>
        </svg>
        <span class="nav-label">Más</span>
      </button>
    </nav>

    <!-- FAB Quick Actions Sheet -->
    <div class="action-sheet-backdrop hidden" id="action-sheet-backdrop"></div>
    <div class="action-sheet hidden" id="action-sheet">
      <div class="action-sheet-handle"></div>
      <p class="action-sheet-title">¿Qué deseas registrar?</p>
      <button class="action-sheet-btn" data-view="nueva-venta">
        <span class="action-sheet-icon action-sheet-icon--green">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
        </span>
        Nueva Venta
      </button>
      <button class="action-sheet-btn" data-view="nuevo-gasto">
        <span class="action-sheet-icon action-sheet-icon--red">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/>
          </svg>
        </span>
        Nuevo Gasto
      </button>
      <button class="action-sheet-btn" data-view="nuevo-pedido">
        <span class="action-sheet-icon action-sheet-icon--blue">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/>
          </svg>
        </span>
        Nuevo Pedido
      </button>
      <button class="action-sheet-cancel" id="action-sheet-cancel">Cancelar</button>
    </div>

  </div>

  <!-- ── Toast container ───────────────────────────────────────────────────── -->
  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

  <!-- ── Modal container ──────────────────────────────────────────────────── -->
  <div id="modal-backdrop" class="modal-backdrop hidden"></div>
  <div id="modal-container" class="modal-container hidden" role="dialog" aria-modal="true"></div>

  <!-- ── Scripts (load order matters) ─────────────────────────────────────── -->
  <script src="https://unpkg.com/@simplewebauthn/browser@13/dist/bundle/index.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/components/toast.js"></script>
  <script src="/js/components/modal.js"></script>
  <script src="/js/components/bottom-nav.js"></script>
  <script src="/js/views/dashboard.js"></script>
  <script src="/js/views/ventas.js"></script>
  <script src="/js/views/nueva-venta.js"></script>
  <script src="/js/views/gastos.js"></script>
  <script src="/js/views/inventario.js"></script>
  <script src="/js/views/clientes.js"></script>
  <script src="/js/views/pedidos.js"></script>
  <script src="/js/views/cursos.js"></script>
  <script src="/js/views/finanzas.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
