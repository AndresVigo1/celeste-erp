app = "celeste-erp"
primary_region = "gru"

[build]

[env]
  PORT = "3000"
  NODE_ENV = "production"
  DB_PATH = "/data/celeste.db"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[[mounts]]
  source = "celeste_data"
  destination = "/data"
  initial_size = "1gb"
